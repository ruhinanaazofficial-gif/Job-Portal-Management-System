<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div th:fragment="navbar">
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">
                   <span style="background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 1.2rem;">J</span> JobPortal
                </a>
                
                <div class="nav-links">
                    <a href="/" class="btn-ghost" style="padding: 0.5rem 0.75rem;">Home</a>
                    <a href="/jobs" class="btn-ghost" style="padding: 0.5rem 0.75rem;">Explore Jobs</a>
                    
                    <!-- Unauthenticated Users -->
                    <div sec:authorize="!isAuthenticated()" class="flex items-center gap-2" style="margin-left: 0.5rem;">
                        <a href="/login" class="btn btn-ghost" style="font-weight: 500;">Sign In</a>
                        <a href="/register" class="btn btn-primary" style="padding: 0.5rem 1.25rem;">Get Started</a>
                    </div>

                    <!-- Authenticated Users -->
                    <div sec:authorize="isAuthenticated()" class="flex items-center gap-3" style="border-left: 1px solid var(--border); padding-left: 1.25rem; margin-left: 0.5rem;">
                        
                        <span sec:authorize="hasAuthority('ROLE_STUDENT')">
                            <a href="/student/dashboard" class="btn-ghost" style="font-weight: 600; color: var(--primary);"><i class="fas fa-columns" style="margin-right: 6px;"></i> Dashboard</a>
                        </span>
                        
                        <span sec:authorize="hasAuthority('ROLE_EMPLOYER')">
                            <a href="/employer/dashboard" class="btn-ghost" style="font-weight: 600; color: var(--primary);"><i class="fas fa-chart-pie" style="margin-right: 6px;"></i> Dashboard</a>
                            <a href="/employer/job/post" class="btn btn-primary" style="padding: 0.4rem 1rem;"><i class="fas fa-plus"></i> Post Job</a>
                        </span>
                        
                        <span sec:authorize="hasAuthority('ROLE_ADMIN')">
                            <a href="/admin/dashboard" class="btn-ghost" style="font-weight: 600; color: var(--primary); font-size: 0.85rem;"><i class="fas fa-user-shield" style="margin-right: 6px;"></i> Admin Office</a>
                        </span>
                        
                        <div class="flex items-center gap-2" style="font-weight: 500; font-size: 0.85rem; background: #F4F4F5; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid var(--border);">
                            <span sec:authentication="principal.name" style="color: var(--text-main);">User</span>
                        </div>
                        
                        <form th:action="@{/logout}" method="post" style="display:inline;">
                            <button type="submit" class="btn-ghost" style="cursor:pointer; font-weight:600; color: var(--accent);"><i class="fas fa-sign-out-alt"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</body>
</html>
