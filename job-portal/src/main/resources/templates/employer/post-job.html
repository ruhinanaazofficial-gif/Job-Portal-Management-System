<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post a New Job - Employer Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="animate-fade">
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 2.5rem;">
                <span style="background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 1.2rem;">J</span> JobPortal
            </div>
            
            <div class="nav-group">
                <div class="nav-label">Main</div>
                <a href="/employer/dashboard" class="nav-item">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="/employer/job/post" class="nav-item active">
                    <i class="fas fa-plus-circle"></i> Post a Job
                </a>
            </div>

            <div class="nav-group" style="margin-top: auto;">
                <div class="nav-label">Account</div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-item" style="width: 100%; border: none; background: transparent; cursor: pointer; text-align: left;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="section-header">
                <div>
                    <h1 style="font-size: 1.5rem; margin-bottom: 0.25rem;">Create New Posting</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Fill out the details to reach top candidates.</p>
                </div>
                <a href="/employer/dashboard" class="btn btn-secondary">Cancel</a>
            </header>

            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <form th:action="@{/employer/job/post}" method="post" th:object="${job}">
                    <div class="form-field">
                        <label class="form-label" for="title">Job Position Title</label>
                        <input type="text" id="title" th:field="*{title}" class="input" placeholder="e.g. Senior Software Engineer" required>
                        <span class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                    </div>

                    <div class="grid grid-cols-2">
                        <div class="form-field">
                            <label class="form-label" for="category">Market Category</label>
                            <select id="category" th:field="*{category}" class="input" required>
                                <option value="">Select Category...</option>
                                <option value="IT">Information Technology</option>
                                <option value="Design">Design & Creative</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Finance">Finance & Accounting</option>
                                <option value="Engineering">Engineering</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label class="form-label" for="skillsRequired">Skills & Tech Stack</label>
                            <input type="text" id="skillsRequired" th:field="*{skillsRequired}" class="input" placeholder="e.g. Java, AWS, React" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-3">
                        <div class="form-field">
                            <label class="form-label" for="jobType">Employment Type</label>
                            <select id="jobType" th:field="*{jobType}" class="input" required>
                                <option value="Full-Time">Full-Time</option>
                                <option value="Part-Time">Part-Time</option>
                                <option value="Contract">Contract</option>
                                <option value="Internship">Internship</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label class="form-label" for="workMode">Working Mode</label>
                            <select id="workMode" th:field="*{workMode}" class="input" required>
                                <option value="Remote">Remote</option>
                                <option value="Hybrid">Hybrid</option>
                                <option value="On-Site">On-Site</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label class="form-label" for="salary">Offered Salary</label>
                            <input type="text" id="salary" th:field="*{salary}" class="input" placeholder="e.g. $80k - $120k" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2">
                        <div class="form-field">
                            <label class="form-label" for="location">Primary Location</label>
                            <input type="text" id="location" th:field="*{location}" class="input" placeholder="City, State" required>
                        </div>
                        <div class="form-field">
                            <label class="form-label" for="experience">Experience Level</label>
                            <input type="text" id="experience" th:field="*{experience}" class="input" placeholder="e.g. 3-5 Years" required>
                        </div>
                    </div>

                    <div class="form-field">
                        <label class="form-label" for="description">Full Job Description</label>
                        <textarea id="description" th:field="*{description}" class="input" placeholder="Describe the responsibilities, perks, and expectations..." rows="8" required style="resize: vertical;"></textarea>
                        <span class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                    </div>

                    <div style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
                        <a href="/employer/dashboard" class="btn btn-secondary">Discard</a>
                        <button type="submit" class="btn btn-primary" style="padding-left: 2rem; padding-right: 2rem;">Publish Posting</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
