<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Jobs - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

<body class="animate-fade">
    <div class="app-layout">
        <!-- Sidebar Navigation (Same as Student Dashboard) -->
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 2.5rem;">
                <span style="background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 1.2rem;">J</span> JobPortal
            </div>
            
            <div class="nav-group">
                <div class="nav-label">Me</div>
                <a href="/student/dashboard" class="nav-item">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="/jobs" class="nav-item active">
                    <i class="fas fa-search"></i> Jobs Market
                </a>
            </div>

            <div class="nav-group" style="margin-top: auto;">
                <div class="nav-label">Account</div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-item" style="width: 100%; border: none; background: transparent; cursor: pointer; text-align: left;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="section-header">
                <div>
                    <h1 style="font-size: 1.5rem; margin-bottom: 0.25rem;">Explore Opportunities</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Discover your next career move.</p>
                </div>
                
                <form action="/jobs" method="get" class="flex gap-2" style="background: white; padding: 4px; border-radius: 8px; border: 1px solid var(--border);">
                    <input type="text" name="keyword" class="input" style="border: none; width: 300px;" placeholder="Search title, skills..." th:value="${keyword}">
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>
            </header>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <div class="grid grid-cols-3">
                <div th:each="job : ${jobs}" class="card animate-fade" style="padding: 1.5rem; display: flex; flex-direction: column;">
                    <div class="flex justify-between items-start mb-4">
                        <div style="background: var(--primary-soft); color: var(--primary); width: 44px; height: 44px; border-radius:10px; display: flex; align-items:center; justify-content: center; font-size: 1.2rem;">
                            <i class="fas fa-briefcase"></i>
                        </div>
                        <span class="badge badge-info" th:text="${job.workMode != null ? job.workMode : 'Remote'}">Remote</span>
                    </div>
                    
                    <h3 style="font-size: 1.25rem; margin-bottom: 0.25rem;" th:text="${job.title}">Job Title</h3>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; font-weight: 500;">
                        <span th:text="${job.postedBy.companyName != null ? job.postedBy.companyName : job.postedBy.name}">Company</span> • <span th:text="${job.location}">Location</span>
                    </div>
                    
                    <p style="color: var(--text-subtle); margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.6;" th:text="${#strings.abbreviate(job.description, 100)}"></p>
                    
                    <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem;">
                        <span style="font-weight: 700; color: var(--text-main); font-size: 1rem;" th:text="${job.salary}">$100k</span>
                        <form th:action="@{'/student/apply/' + ${job.id}}" method="post">
                            <button type="submit" class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Apply Now</button>
                        </form>
                    </div>
                </div>
                
                <div th:if="${#lists.isEmpty(jobs)}" class="card" style="grid-column: 1 / -1; text-align: center; padding: 4rem;">
                    <h3 style="color: var(--text-muted);">No jobs matching your search.</h3>
                    <p class="text-subtle mt-2">Try different keywords or check back later.</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
