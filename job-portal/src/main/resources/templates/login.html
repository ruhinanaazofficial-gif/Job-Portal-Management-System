<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="animate-fade">
    <div class="auth-container">
        <div class="auth-box">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="/" class="logo" style="justify-content: center;">
                   <span style="background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 1.2rem;">J</span> JobPortal
                </a>
            </div>
            
            <h2 class="auth-title" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Welcome back</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">Enter your email and password to access your account.</p>
            
            <div th:if="${param.error}" class="alert alert-error">
                Invalid email address or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have successfully logged out.
            </div>
            <div th:if="${param.success}" class="alert alert-success">
                Account created! Please log in below.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-field">
                    <label class="form-label" for="username">Email Address</label>
                    <input type="email" id="username" name="username" class="input" placeholder="name@company.com" required autofocus>
                </div>
                
                <div class="form-field">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                        <label class="form-label" for="password" style="margin: 0;">Password</label>
                        <a href="#" style="font-size: 0.75rem; font-weight: 500; color: var(--primary);">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" class="input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary mt-4" style="width: 100%; height: 42px;">Sign in</button>
            </form>
            
            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
                <p style="color: var(--text-muted); font-size: 0.875rem;">Don't have an account? <a href="/register" style="font-weight: 600; color: var(--primary);">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
