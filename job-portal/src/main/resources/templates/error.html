<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="animate-fade">
    <div class="auth-container">
        <div class="auth-box" style="text-align: center; max-width: 480px;">
            <div style="background: var(--accent-light); color: var(--accent); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 2rem auto;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 style="font-size: 2rem; margin-bottom: 1rem; color: var(--text-main);">Something went wrong</h1>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.6;" th:text="${errorMessage}">An unexpected error has occurred on our servers. Please try again later.</p>
            <a href="/" class="btn btn-primary" style="padding-left: 2rem; padding-right: 2rem;">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
