<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Entities - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="animate-fade">
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 2.5rem;">
                <span style="background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-size: 1.2rem;">J</span> JobPortal
            </div>
            
            <div class="nav-group">
                <div class="nav-label">Management</div>
                <a href="/admin/dashboard" class="nav-item">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="/admin/users" class="nav-item active">
                    <i class="fas fa-users"></i> Users Control
                </a>
                <a href="/admin/jobs" class="nav-item">
                    <i class="fas fa-briefcase"></i> Job Monitor
                </a>
            </div>

            <div class="nav-group" style="margin-top: auto;">
                <div class="nav-label">Account</div>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-item" style="width: 100%; border: none; background: transparent; cursor: pointer; text-align: left;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="section-header">
                <div>
                    <h1 style="font-size: 1.5rem; margin-bottom: 0.25rem;">User Directory</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Manage and monitor all platform entities.</p>
                </div>
                <a href="/admin/dashboard" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            </header>

            <div class="card" style="padding: 0;">
                <div class="table-container" style="border: none; border-radius: var(--radius-md);">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>Entity Profile</th>
                                <th>Access Level</th>
                                <th style="text-align: right;">Registration Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td style="color: var(--text-subtle); font-family: monospace;" th:text="'#' + ${user.id}">#1</td>
                                <td>
                                    <div style="font-weight: 600; color: var(--text-main);" th:text="${user.name}">Name</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${user.email}">Email</div>
                                </td>
                                <td>
                                    <span th:if="${user.role.name() == 'ROLE_STUDENT'}" class="badge badge-info">Candidate</span>
                                    <span th:if="${user.role.name() == 'ROLE_EMPLOYER'}" class="badge badge-warning">Employer</span>
                                    <span th:if="${user.role.name() == 'ROLE_ADMIN'}" class="badge badge-error">Administrator</span>
                                </td>
                                <td style="text-align: right; color: var(--text-muted);" th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
